<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Island Reborn - Roblox Game Maker</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#3fa9f5;
    --sky-mid:#8fd6ff;
    --sky-bottom:#f4fbff;
    --sun-glow:#fff4c8;
    --panel:rgba(24,34,46,0.58);
    --panel-light:rgba(255,255,255,0.14);
    --panel-border:rgba(255,255,255,0.35);
    --ink:#132433;
    --white:#ffffff;
    --accent-blue:#3fb6ff;
    --accent-blue-deep:#1c8de0;
    --green:#7CFF7C;
    --orange:#FFB347;
    --red:#FF5C5C;
    --discord:#5865F2;
    --discord-deep:#4752c4;
    --radius:22px;
    --font-display:'Fredoka', sans-serif;
    --font-body:'Poppins', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    color:var(--white);
    overflow-x:hidden;
    min-height:100vh;
  }

  /* ---------- LIVING SKY BACKGROUND ---------- */
  .sky{
    position:fixed;
    inset:0;
    z-index:-3;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-bottom) 100%);
  }
  .sun{
    position:fixed;
    top:-12vw;
    right:-8vw;
    width:38vw;
    height:38vw;
    max-width:520px;
    max-height:520px;
    border-radius:50%;
    background:radial-gradient(circle, var(--sun-glow) 0%, rgba(255,244,200,0.55) 45%, rgba(255,244,200,0) 72%);
    filter:blur(6px);
    z-index:-2;
    animation:sunPulse 9s ease-in-out infinite;
  }
  @keyframes sunPulse{
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.06);opacity:0.85;}
  }
  .cloud{
    position:fixed;
    z-index:-1;
    background:rgba(255,255,255,0.55);
    border-radius:50%;
    filter:blur(14px);
    opacity:0.8;
    animation-name:drift;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
  }
  @keyframes drift{
    from{transform:translateX(-20vw);}
    to{transform:translateX(120vw);}
  }
  .c1{width:220px;height:70px;top:14%;animation-duration:52s;}
  .c2{width:160px;height:55px;top:28%;animation-duration:70s;animation-delay:-20s;opacity:0.6;}
  .c3{width:280px;height:85px;top:60%;animation-duration:85s;animation-delay:-40s;opacity:0.5;}
  .c4{width:130px;height:45px;top:75%;animation-duration:60s;animation-delay:-10s;opacity:0.65;}

  @media (prefers-reduced-motion: reduce){
    .sun,.cloud,.logo-float,.bob{animation:none !important;}
    *{transition-duration:0.01ms !important;}
  }

  /* ---------- LAYOUT SHELL ---------- */
  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 20px 60px;
  }

  .topbar{
    position:relative;
    width:100%;
    max-width:1100px;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    animation:fadeDown 0.5s ease both;
  }
  .home-btn{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    color:var(--white);
    font-family:var(--font-display);
    font-weight:600;
    font-size:15px;
    padding:10px 18px;
    border-radius:999px;
    cursor:pointer;
    backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease;
  }
  .home-btn:hover{transform:translateY(-2px) scale(1.03); background:rgba(24,34,46,0.75);}
  .home-btn:active{transform:translateY(0) scale(0.98);}
  .breadcrumb{
    font-family:var(--font-body);
    font-size:14px;
    color:rgba(255,255,255,0.85);
    background:var(--panel);
    border:1px solid var(--panel-border);
    padding:9px 16px;
    border-radius:999px;
    backdrop-filter:blur(8px);
  }
  .breadcrumb b{color:var(--white); font-weight:600;}

  main{
    width:100%;
    max-width:1100px;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .view{
    width:100%;
    animation:viewIn 0.45s cubic-bezier(.2,.9,.3,1) both;
  }
  @keyframes viewIn{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes fadeDown{
    from{opacity:0; transform:translateY(-10px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* ---------- HOME / MAIN MENU ---------- */
  .home-view{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:78vh;
    text-align:center;
  }
  .logo-float{
    width:min(340px, 62vw);
    animation:bob 4.5s ease-in-out infinite;
    filter:drop-shadow(0 18px 30px rgba(10,40,70,0.25));
  }
  @keyframes bob{
    0%,100%{transform:translateY(0px) rotate(0deg);}
    50%{transform:translateY(-14px) rotate(-1deg);}
  }
  .menu-grid{
    margin-top:46px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    width:min(560px, 90vw);
  }
  .menu-btn{
    font-family:var(--font-display);
    font-weight:600;
    font-size:22px;
    letter-spacing:0.3px;
    padding:20px 10px;
    border-radius:16px;
    border:2px solid rgba(255,255,255,0.35);
    background:var(--panel);
    color:var(--white);
    cursor:pointer;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 0 rgba(0,0,0,0.18), 0 14px 24px rgba(10,40,70,0.18);
    transition:transform .16s ease, box-shadow .16s ease, background .16s ease;
  }
  .menu-btn:hover{transform:translateY(-4px); box-shadow:0 12px 0 rgba(0,0,0,0.18), 0 20px 30px rgba(10,40,70,0.22);}
  .menu-btn:active{transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,0.18);}
  .menu-btn.play{color:#8CFF8C;}
  .menu-btn.create{color:#7FD8FF;}
  .menu-btn.secondary{font-size:17px; padding:14px 10px; background:rgba(24,34,46,0.42);}

  /* ---------- GENERIC PANEL / CARD LIST (Rules-style) ---------- */
  .panel-title{
    font-family:var(--font-display);
    font-size:clamp(28px,4vw,40px);
    font-weight:700;
    margin:4px 0 6px;
    text-align:center;
  }
  .panel-subtitle{
    text-align:center;
    color:rgba(255,255,255,0.85);
    margin:0 0 26px;
    font-weight:300;
    max-width:640px;
  }

  .list-panel{
    width:100%;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    backdrop-filter:blur(10px);
    overflow:hidden;
    box-shadow:0 16px 40px rgba(8,30,55,0.25);
  }
  .list-row{
    display:flex;
    align-items:center;
    gap:16px;
    padding:18px 22px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.08);
    transition:background .15s ease, padding-left .15s ease;
  }
  .list-row:last-child{border-bottom:none;}
  .list-row:hover{background:rgba(255,255,255,0.08); padding-left:28px;}
  .list-emoji{
    font-size:30px;
    width:46px;
    text-align:center;
    flex-shrink:0;
  }
  .list-text b{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    display:block;
  }
  .list-text span{
    font-size:14px;
    color:rgba(255,255,255,0.75);
    font-weight:300;
  }

  /* ---------- RULE DETAIL ---------- */
  .detail-panel{
    width:100%;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    backdrop-filter:blur(10px);
    padding:32px clamp(20px,4vw,44px);
    box-shadow:0 16px 40px rgba(8,30,55,0.25);
  }
  .rule-detail-title{
    font-family:var(--font-display);
    font-size:clamp(24px,3.4vw,32px);
    font-weight:700;
    margin:0 0 6px;
  }
  .rule-detail-sub{
    font-weight:300;
    font-style:italic;
    color:rgba(255,255,255,0.8);
    margin:0 0 22px;
    padding-bottom:18px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .tier-heading{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    margin:22px 0 10px;
  }
  .rule-list{
    margin:0 0 12px;
    padding-left:22px;
    font-weight:300;
    line-height:1.7;
  }
  .rule-list li{margin-bottom:2px;}
  .punishment{
    display:inline-block;
    font-family:var(--font-display);
    font-weight:600;
    font-size:15px;
    padding:8px 16px;
    border-radius:999px;
    margin-top:4px;
  }
  .p-green{color:#0f3d0f; background:var(--green);}
  .p-orange{color:#4a2c00; background:var(--orange);}
  .p-red{color:#4a0000; background:var(--red);}
  .rule-note{
    margin-top:22px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.12);
    font-size:13.5px;
    font-style:italic;
    font-weight:300;
    color:rgba(255,255,255,0.7);
  }

  /* ---------- WIKI HUB ---------- */
  .hub-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
    width:100%;
    max-width:760px;
  }
  .hub-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    padding:36px 24px;
    text-align:center;
    cursor:pointer;
    backdrop-filter:blur(10px);
    transition:transform .2s ease, box-shadow .2s ease;
    box-shadow:0 10px 26px rgba(8,30,55,0.2);
  }
  .hub-card:hover{transform:translateY(-8px) scale(1.02); box-shadow:0 20px 40px rgba(8,30,55,0.3);}
  .hub-icon{font-size:52px; margin-bottom:12px; display:block;}
  .hub-card h3{font-family:var(--font-display); font-size:24px; margin:0 0 8px;}
  .hub-card p{font-weight:300; font-size:14px; color:rgba(255,255,255,0.78); margin:0;}

  /* ---------- CARD GRID (items / guides) ---------- */
  .filter-row{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:26px;
  }
  .tag-pill{
    font-family:var(--font-body);
    font-weight:600;
    font-size:13px;
    padding:8px 18px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.08);
    color:var(--white);
    cursor:pointer;
    transition:all .15s ease;
  }
  .tag-pill.active, .tag-pill:hover{background:var(--accent-blue); border-color:var(--accent-blue); color:#04263b;}

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:18px;
    width:100%;
  }
  .item-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:20px 14px 16px;
    text-align:center;
    cursor:pointer;
    backdrop-filter:blur(8px);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .item-card:hover{transform:translateY(-6px) rotate(-0.5deg); box-shadow:0 16px 30px rgba(8,30,55,0.3);}
  .item-card .thumb{
    width:64px; height:64px; margin:0 auto 12px;
    display:flex; align-items:center; justify-content:center;
    font-size:38px;
    background:rgba(255,255,255,0.1);
    border-radius:14px;
    overflow:hidden;
  }
  .item-card .thumb img{width:100%; height:100%; object-fit:cover;}
  .item-card h4{font-family:var(--font-display); font-size:16px; margin:0 0 8px; font-weight:600;}
  .mini-tags{display:flex; flex-wrap:wrap; gap:5px; justify-content:center;}
  .mini-tag{
    font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:999px;
    background:rgba(255,255,255,0.14); color:rgba(255,255,255,0.85);
  }

  .item-detail-head{display:flex; gap:22px; align-items:center; flex-wrap:wrap; margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid rgba(255,255,255,0.12);}
  .item-detail-thumb{
    width:100px; height:100px; border-radius:20px; flex-shrink:0;
    background:rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center; font-size:56px;
    overflow:hidden;
  }
  .item-detail-thumb img{width:100%; height:100%; object-fit:cover;}
  .item-detail-body{font-weight:300; line-height:1.8; font-size:15px;}
  .item-detail-body p{margin:0 0 14px;}

  .video-wrap{
    position:relative; width:100%; padding-top:56.25%; border-radius:16px; overflow:hidden; margin:18px 0;
    background:rgba(0,0,0,0.35);
  }
  .video-wrap iframe{position:absolute; inset:0; width:100%; height:100%; border:0;}
  .no-video{
    padding:26px; text-align:center; font-weight:300; font-style:italic; color:rgba(255,255,255,0.6);
    background:rgba(255,255,255,0.06); border-radius:16px; margin:18px 0;
  }

  /* ---------- COMMUNITY ---------- */
  .discord-block{
    width:100%;
    background:linear-gradient(135deg, rgba(88,101,242,0.35), rgba(24,34,46,0.6));
    border:1px solid rgba(88,101,242,0.5);
    border-radius:var(--radius);
    padding:34px 28px;
    text-align:center;
    margin-bottom:34px;
    backdrop-filter:blur(10px);
  }
  .discord-block p{font-weight:300; max-width:520px; margin:14px auto 22px; color:rgba(255,255,255,0.9);}
  .discord-btn{
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--font-display); font-weight:600; font-size:17px;
    background:var(--discord); color:var(--white);
    padding:14px 30px; border-radius:999px; border:none; cursor:pointer;
    box-shadow:0 8px 0 var(--discord-deep), 0 14px 26px rgba(20,20,60,0.3);
    transition:transform .15s ease, box-shadow .15s ease;
    text-decoration:none;
  }
  .discord-btn:hover{transform:translateY(-3px);}
  .discord-btn:active{transform:translateY(4px); box-shadow:0 4px 0 var(--discord-deep);}

  .staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:18px;
    width:100%;
  }
  .staff-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:22px 18px;
    text-align:center;
    backdrop-filter:blur(8px);
    transition:transform .18s ease;
  }
  .staff-card:hover{transform:translateY(-5px);}
  .staff-avatar{
    width:78px; height:78px; border-radius:50%; margin:0 auto 14px;
    background:linear-gradient(135deg, var(--accent-blue), var(--discord));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:24px;
    overflow:hidden; border:2px solid rgba(255,255,255,0.4);
  }
  .staff-avatar img{width:100%; height:100%; object-fit:cover;}
  .staff-card h4{font-family:var(--font-display); font-size:18px; margin:0 0 2px;}
  .staff-role{font-size:12.5px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:#8fe3ff; margin-bottom:10px;}
  .staff-meta{font-size:13px; font-weight:300; color:rgba(255,255,255,0.85); line-height:1.6;}
  .staff-meta b{font-weight:600; color:var(--white);}

  footer{
    margin-top:50px;
    font-size:12.5px;
    color:rgba(255,255,255,0.6);
    font-weight:300;
    text-align:center;
  }

  @media (max-width:560px){
    .menu-grid{grid-template-columns:1fr 1fr; gap:12px;}
    .hub-grid{grid-template-columns:1fr;}
    .item-detail-head{flex-direction:column; text-align:center;}
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="sun"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>
<div class="cloud c4"></div>

<div id="app">
  <div class="topbar" id="topbar" style="display:none;"></div>
  <main id="main"></main>
  <footer>Build Island Reborn is a Roblox experience. Not affiliated with or endorsed by Roblox Corporation.</footer>
</div>

<script>
/* ============================= DATA ============================= */

const RULES = [
  {
    slug:"griefing", emoji:"⚔️", title:"Griefing",
    shortDesc:"Intentional disruption of other players' builds or gameplay",
    html:`
      <div class="rule-detail-title">⚔️ Griefing</div>
      <p class="rule-detail-sub">Actions that intentionally disrupt or destroy other players' gameplay experience</p>

      <div class="tier-heading">🟢 Minor Griefing</div>
      <ul class="rule-list">
        <li>Building on top of other players' creations</li>
        <li>Placing traps or objects around spawn</li>
      </ul>
      <span class="punishment p-green">✓ No punishment (server admins can prevent this easily)</span>

      <div class="tier-heading">🟡 Standard Griefing</div>
      <ul class="rule-list">
        <li>Spawn-kill builds or repeated forced death traps</li>
        <li>Structures designed to annoy or disrupt large portions of the server</li>
      </ul>
      <span class="punishment p-orange">⛔ 1-day ban</span>

      <div class="tier-heading">🔴 Major Griefing</div>
      <ul class="rule-list">
        <li>Builds or systems that intentionally break server functionality</li>
        <li>Crash scripts, extreme lag machines, or gameplay disabling contraptions</li>
      </ul>
      <span class="punishment p-red">🚫 7-day ban or higher depending on severity</span>

      <p class="rule-note">Note: High part-count builds are not automatically major griefing if manageable via server settings (cooldowns or block rank restrictions).</p>
    `
  },
  {
    slug:"nsfw-content", emoji:"🔞", title:"NSFW Content",
    shortDesc:"Inappropriate NSFW content in builds or servers",
    html:`
      <div class="rule-detail-title">🔞 NSFW Content</div>

      <div class="tier-heading">🟡 Minor</div>
      <ul class="rule-list">
        <li>Suggestive builds</li>
        <li>Ambiguous or inappropriate shapes</li>
      </ul>
      <span class="punishment p-orange">⛔ 1-day ban</span>

      <div class="tier-heading">🔴 Major</div>
      <ul class="rule-list">
        <li>Explicit NSFW builds or content</li>
        <li>Servers dedicated to NSFW material</li>
      </ul>
      <span class="punishment p-red">🚫 2-week ban → Permanent on 2nd offense</span>
    `
  },
  {
    slug:"blood-violence", emoji:"🩸", title:"Blood & Violence",
    shortDesc:"Prohibited blood or realistic violence in builds or servers",
    html:`
      <div class="rule-detail-title">🩸 Blood & Violence</div>

      <div class="tier-heading">🟡 Minor</div>
      <ul class="rule-list">
        <li>Minor/unrealistic blood elements</li>
        <li>Unintentional inclusion of realistic combat details</li>
      </ul>
      <span class="punishment p-orange">⛔ Warning or 1-day ban</span>

      <div class="tier-heading">🔴 Major</div>
      <ul class="rule-list">
        <li>Explicit blood systems or realistic violence</li>
        <li>Servers dedicated to gory, bloody, or violent material</li>
      </ul>
      <span class="punishment p-red">🚫 1-week ban → Permanent on 2nd offense</span>
    `
  },
  {
    slug:"exploiting", emoji:"💻", title:"Exploiting",
    shortDesc:"Using external tools or code to gain unfair advantage",
    html:`
      <div class="rule-detail-title">💻 Exploiting</div>
      <ul class="rule-list">
        <li>Using injected code or unauthorized third-party tools</li>
        <li>Gaining unfair advantages or disrupting servers through exploits</li>
      </ul>
      <span class="punishment p-red">🚫 Permanent ban</span>
    `
  },
  {
    slug:"abusing-glitches", emoji:"🐛", title:"Abusing Glitches",
    shortDesc:"Using unintended game mechanics for advantage or disruption",
    html:`
      <div class="rule-detail-title">🐛 Abusing Glitches</div>
      <ul class="rule-list">
        <li>Using bugs to kick or ban moderators</li>
        <li>Duplicating in-game currency or items (e.g. Stamps)</li>
        <li>Exploiting unintended mechanics for advantage</li>
      </ul>
      <span class="punishment p-orange">⛔ 2-day ban</span>
    `
  },
  {
    slug:"misinformation", emoji:"📢", title:"Misinformation",
    shortDesc:"Spreading false or harmful claims about the game",
    html:`
      <div class="rule-detail-title">📢 Misinformation</div>
      <ul class="rule-list">
        <li>Spreading false claims about the game or staff</li>
        <li>Intentional harmful or misleading statements (including politically driven misinformation)</li>
      </ul>
      <span class="punishment p-orange">⛔ 1-day ban → Permanent on 2nd offense</span>
    `
  },
  {
    slug:"inappropriate-symbolism", emoji:"📋", title:"Inappropriate Symbolism",
    shortDesc:"Use of extremist or prohibited symbols",
    html:`
      <div class="rule-detail-title">📋 Inappropriate Symbolism</div>
      <ul class="rule-list">
        <li>Building or displaying extremist symbols (e.g. swastikas or similar content)</li>
      </ul>
      <span class="punishment p-orange">⛔ 1-day ban</span>
    `
  },
  {

/* ============================= HELPERS ============================= */

function esc(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function initials(name){
  return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}
function avatarHTML(person){
  if(person.image){
    return `<img src="${esc(person.image)}" alt="${esc(person.name)}">`;
  }
  return initials(person.name);
}
function thumbHTML(entry){
  if(entry.image){
    return `<img src="${esc(entry.image)}" alt="${esc(entry.title)}">`;
  }
  return entry.emoji || '❔';
}
function setTitle(suffix){
  document.title = suffix ? `${BASE_TITLE} — ${suffix}` : BASE_TITLE;
}
function go(hash){
  window.location.hash = hash;
}

/* ============================= ROUTER ============================= */

function parseHash(){
  let h = window.location.hash.slice(1); // remove '#'
  if(h.startsWith('/')) h = h.slice(1);
  return h.split('/').filter(Boolean);
}

function render(){
  const parts = parseHash();
  const topbar = document.getElementById('topbar');
  const mainEl = document.getElementById('main');
  mainEl.innerHTML = '';
  window.scrollTo({top:0, behavior:'smooth'});

  if(parts.length === 0){
    topbar.style.display = 'none';
    setTitle('');
    mainEl.appendChild(viewHome());
    return;
  }

  topbar.style.display = 'flex';

  if(parts[0] === 'rules' && parts.length === 1){
    setBreadcrumb('Rules');
    setTitle('Game Rules');
    mainEl.appendChild(viewRulesList());
  } else if(parts[0] === 'rules' && parts.length === 2){
    const rule = RULES.find(r=>r.slug===parts[1]);
    if(!rule){ mainEl.appendChild(view404()); return; }
    setBreadcrumb(`Rules <span style="opacity:.5">›</span> <b>${esc(rule.title)}</b>`);
    setTitle(rule.title);
    mainEl.appendChild(viewRuleDetail(rule));
  } else if(parts[0] === 'create' && parts.length === 1){
    setBreadcrumb('Create');
    setTitle('Wiki');
    mainEl.appendChild(viewWikiHub());
  } else if(parts[0] === 'create' && parts[1] === 'items' && parts.length === 2){
    setBreadcrumb('Create <span style="opacity:.5">›</span> <b>Items</b>');
    setTitle('Items');
    mainEl.appendChild(viewItemsGrid());
  } else if(parts[0] === 'create' && parts[1] === 'items' && parts.length === 3){
    const item = ITEMS.find(i=>i.slug===parts[2]);
    if(!item){ mainEl.appendChild(view404()); return; }
    setBreadcrumb(`Create <span style="opacity:.5">›</span> Items <span style="opacity:.5">›</span> <b>${esc(item.title)}</b>`);
    setTitle(item.title);
    mainEl.appendChild(viewItemDetail(item));
  } else if(parts[0] === 'create' && parts[1] === 'guides' && parts.length === 2){
    setBreadcrumb('Create <span style="opacity:.5">›</span> <b>Guides</b>');
    setTitle('Guides');
    mainEl.appendChild(viewGuidesGrid());
  } else if(parts[0] === 'create' && parts[1] === 'guides' && parts.length === 3){
    const guide = GUIDES.find(g=>g.slug===parts[2]);
    if(!guide){ mainEl.appendChild(view404()); return; }
    setBreadcrumb(`Create <span style="opacity:.5">›</span> Guides <span style="opacity:.5">›</span> <b>${esc(guide.title)}</b>`);
    setTitle(guide.title);
    mainEl.appendChild(viewGuideDetail(guide));
  } else if(parts[0] === 'community'){
    setBreadcrumb('Community');
    setTitle('Community');
    mainEl.appendChild(viewCommunity());
  } else {
    setBreadcrumb('');
    setTitle('');
    mainEl.appendChild(view404());
  }
}

function setBreadcrumb(html){
  document.getElementById('topbar').innerHTML = `
    <button class="home-btn" onclick="go('')">🏠 Home</button>
    <div class="breadcrumb">${html}</div>
  `;
}

}
