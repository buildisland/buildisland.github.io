<!DOCTYPE html>
<html>
<head>
    <!-- content="0; specifies a 0-second delay for an immediate redirect -->
    <meta http-equiv="refresh" content="0; url=https://www.example.com">
</head>
<body>
    <p>If you are not redirected, <a href="https://www.example.com">click here</a>.</p>
</body>
</html>
